name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p build

          for platform in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="build/llm-proxy-${os}-${arch}"
            echo "Building ${os}/${arch}..."
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 go build -ldflags="${LDFLAGS}" -o "${output}" .
          done

      - name: Create checksums
        run: |
          cd build
          sha256sum llm-proxy-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/llm-proxy-*
            build/checksums.txt
